aid: peoples-united-financial
name: People's United Financial
description: |-
  Defunct U.S. regional bank holding company, headquartered in Bridgeport,
  Connecticut. Acquired by M&T Bank Corporation in an all-stock deal valued at
  approximately $7.6 billion. The acquisition was announced February 22, 2021
  and closed April 2, 2022. People's United operated roughly 403 branches at
  close and was fully integrated into M&T Bank by Q3 2022. The People's United
  brand has been retired; peoples.com now 301-redirects to mtb.com. No public
  developer program, OpenAPI definitions, SDKs, GitHub organization, or
  documented APIs existed at any point during its operating history.
